services:
  backend:
    container_name: backend
    image: back-app:latest
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./Logs:/app/Logs
      - ./Configs:/app/Configs

  frontend:
    container_name: frontend
    image: front-app:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend