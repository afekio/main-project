services:
  backend:
    container_name: backend
    image: app-backend:latest
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./Logs:/app/Logs
      - ./Configs:/app/Configs

  frontend:
    container_name: frontend
    image: app-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend


  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: provision_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
   pgdata: